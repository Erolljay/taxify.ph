<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIR Form 2550Q – Quarterly VAT Return</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: #f4f6f9; overflow: auto; height: auto; font-size: 13px; }
    .rw { max-width: 960px; margin: 0 auto; padding: 16px; }

    /* Form layout */
    .bir-form { background: white; border: 1px solid #c5cdd8; border-radius: 8px; overflow: hidden; margin-bottom: 14px; }
    .bir-header { background: #0d1b3e; color: white; padding: 10px 16px; font-size: 12px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
    .bir-row { display: flex; border-bottom: 1px solid #f0f0f0; min-height: 36px; }
    .bir-row:last-child { border-bottom: none; }
    .bir-row.total { background: #f8fafc; font-weight: 700; }
    .bir-row.payable { background: #fef2f2; }
    .bir-row.refund  { background: #f0fdf4; }
    .bir-row.section-head { background: #e8edf5; font-weight: 700; font-size: 11px; color: #0d1b3e; }
    .item-no { width: 36px; min-width: 36px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; color: #6b7280; background: #f8fafc; border-right: 1px solid #f0f0f0; }
    .item-label { flex: 1; padding: 8px 12px; font-size: 11.5px; color: #1a1a2e; display: flex; align-items: center; line-height: 1.4; }
    .item-label small { font-size: 10px; color: #6b7280; display: block; }
    .item-col { width: 160px; min-width: 160px; border-left: 1px solid #f0f0f0; display: flex; align-items: center; }
    .item-col.wide { width: 200px; min-width: 200px; }
    .item-col-head { background: #0d1b3e; color: #94a3c4; font-size: 9px; font-weight: 700; text-align: center; padding: 4px; letter-spacing: 0.3px; }
    .amt { font-family: 'Courier New', monospace; font-size: 12px; text-align: right; padding: 6px 10px; width: 100%; }
    .amt.computed { color: #0d1b3e; font-weight: 600; }
    .amt.manual { background: #fffbeb; color: #92400e; }
    .amt.zero { color: #c5cdd8; }
    .amt.payable { color: #c0392b; font-weight: 700; font-size: 13px; }
    .amt.refund { color: #27ae60; font-weight: 700; font-size: 13px; }
    input.amt { border: none; border-bottom: 1.5px dashed #f59e0b; outline: none; background: #fffbeb; border-radius: 0; }
    input.amt:focus { background: #fef3c7; border-bottom-color: #d97706; }

    /* Schedule 3 table */
    .sched-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .sched-table th { background: #0d1b3e; color: white; padding: 6px 10px; text-align: left; }
    .sched-table td { padding: 6px 10px; border-bottom: 1px solid #f0f0f0; }
    .sched-table tr:nth-child(even) { background: #fafbfc; }
    .sched-table tfoot td { font-weight: 700; background: #e8edf5; border-top: 2px solid #c5cdd8; }

    /* Period header */
    .period-info { background: #0d1b3e; color: white; padding: 12px 16px; border-radius: 8px; margin-bottom: 14px; font-size: 12px; display: flex; gap: 24px; flex-wrap: wrap; }
    .period-info .pi-item { display: flex; flex-direction: column; gap: 2px; }
    .period-info .pi-label { font-size: 9px; color: #94a3c4; text-transform: uppercase; letter-spacing: 0.5px; }
    .period-info .pi-value { font-weight: 700; font-size: 13px; }

    /* Tabs */
    .tab-bar { display: flex; gap: 4px; margin-bottom: 14px; border-bottom: 2px solid #e5e7eb; }
    .tab-btn { background: none; border: none; padding: 8px 16px; font-size: 12px; font-weight: 600; color: #6b7280; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: #0d1b3e; border-bottom-color: #0d1b3e; }
    .tax-codes-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .tax-codes-table th { background: #0d1b3e; color: white; padding: 8px 10px; text-align: left; font-size: 11px; }
    .tax-codes-table td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; vertical-align: middle; }
    .tax-codes-table select { width: 100%; padding: 5px; font-size: 12px; }

    /* Print styles */
    @media print {
      body { background: white; }
      .no-print { display: none !important; }
      .rw { padding: 0; max-width: 100%; }
      .bir-form { border: 1px solid #999; border-radius: 0; page-break-inside: avoid; }
    }
  </style>
</head>
<body>
<div class="rw">

  <!-- Controls -->
  <div class="no-print" style="margin-bottom:14px;">
    <div class="page-header" style="margin-bottom:10px;">
      <div>
        <div class="page-title">📋 BIR Form 2550Q</div>
        <div class="page-subtitle">Quarterly Value-Added Tax Return — April 2024 ENCS</div>
      </div>
    </div>

    <!-- Business selector injected here by getReportBusiness() if multiple businesses -->
    <div id="biz-selector-wrap"></div>

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="return">📋 Return</button>
      <button class="tab-btn" data-tab="taxcodes">🗂 Tax Codes</button>
    </div>
  </div>

  <!-- RETURN TAB -->
  <div id="tab-return" class="no-print-wrap">
    <div class="no-print" style="margin-bottom:14px;" id="filter-bar-wrap">
      <div class="filter-bar">
        <label>View</label>
        <select id="f-ptype">
          <option value="quarterly" selected>Quarterly (official filing)</option>
          <option value="monthly">Monthly (single month within the quarter)</option>
        </select>
        <span id="f-qwrap">
          <label>Quarter</label>
          <select id="f-quarter"></select>
        </span>
        <span id="f-mwrap" style="display:none;">
          <label>Month</label>
          <select id="f-month"></select>
        </span>
        <label>Year</label>
        <select id="f-year"></select>
        <div class="filter-sep"></div>
        <button class="btn btn-primary" id="btn-gen">⚡ Generate</button>
      </div>
    </div>
    <!-- Kept outside filter-bar-wrap so it still works when embedded by the
         VAT wizard, which hides the filter bar but should still let the
         preparer print/save the return as a PDF for client approval. -->
    <div class="no-print" style="margin-bottom:14px;">
      <button class="btn btn-outline" id="btn-print" style="display:none" onclick="window.print()">🖨 Print / Save as PDF (for client approval)</button>
    </div>

    <!-- Output -->
    <div id="output">
      <div class="alert alert-info">Select a quarter and year, then click <strong>Generate</strong>.</div>
    </div>
  </div>

  <!-- TAX CODES TAB -->
  <div id="tab-taxcodes" style="display:none;">
    <div id="taxcodes-output">
      <div class="alert alert-info">Loading tax code mapping…</div>
    </div>
  </div>

</div>

<script>const REPORT_ID = "b2c3d4e5-f6a7-4890-b123-c4d5e6f7a8b9";</script>
<script src="shared/shared.js"></script>
<script src="shared/entitlement-core.js"></script>
<script src="shared/entitlement.js"></script>
<script src="shared/tax-rates.js"></script>
<script src="shared/tax-codes.js"></script>
<script>
// VAT_CATEGORY_TC_NAME, fetchManagerTaxCodes, autoMatchVatMapping,
// getMappingOverrides/saveMappingOverrides, and getVatMapping are defined in tax-codes.js

function lineAmounts(item, line, rateByKey) {
  const qty       = Number(line?.qty ?? 1);
  const unitPrice = Number(line?.salesUnitPrice ?? line?.purchaseUnitPrice ?? line?.unitPrice ?? 0);
  let gross = qty * unitPrice;
  if (line?.discountPercentage) gross *= (1 - Number(line.discountPercentage) / 100);
  gross -= Number(line?.discountAmount || 0);

  const tcKey = line?.taxCode || line?.TaxCode || '';
  const rate  = Number(rateByKey?.[tcKey] ?? 0);
  const includesTax = !!item?.amountsIncludeTax;

  let net, tax;
  if (rate) {
    if (includesTax) { net = gross / (1 + rate / 100); tax = gross - net; }
    else             { net = gross; tax = gross * rate / 100; }
  } else {
    net = gross; tax = 0;
  }
  return { net: Math.abs(net), tax: Math.abs(tax), gross: Math.abs(gross) };
}

// ── TAX CODES TAB ────────────────────────────────────────────
async function loadTaxCodesTab() {
  const biz = App.currentBusiness || '';
  const out = document.getElementById('taxcodes-output');
  if (!biz) { out.innerHTML = `<div class="alert alert-warn">⚠️ No business selected.</div>`; return; }

  out.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>Loading tax codes…</span></div>`;
  try {
    const taxCodes = await fetchManagerTaxCodes(biz);
    const auto      = autoMatchVatMapping(taxCodes);
    const overrides = getMappingOverrides(biz);

    const optionsHtml = taxCodes
      .slice()
      .sort((a, b) => a.name.localeCompare(b.name))
      .map(tc => `<option value="${escHtml(tc.key)}">${escHtml(tc.name)}</option>`)
      .join('');

    const rows = Object.entries(VAT_CATEGORY_TC_NAME).map(([catKey, tcName]) => {
      const selectedKey = (overrides[catKey] !== undefined ? overrides[catKey] : auto[catKey]) || '';
      const found = !!auto[catKey];
      return `
        <tr>
          <td>
            <strong>${escHtml(tcName)}</strong>
            ${found ? '' : `<div style="font-size:10px;color:#c0392b;">⚠️ No matching tax code found in Manager</div>`}
          </td>
          <td>
            <select class="tc-map-sel" data-cat="${catKey}">
              <option value="">— Not mapped —</option>
              ${optionsHtml}
            </select>
          </td>
        </tr>`;
    }).join('');

    out.innerHTML = `
      <div class="alert alert-info" style="margin-bottom:14px;font-size:11px;">
        ℹ️ Each BIR category is matched by default to the Manager tax code with the matching standard name.
        If you renamed a tax code or use a different one, choose it here. This affects the figures pulled into the 2550Q.
      </div>
      <div class="card" style="padding:0;overflow:hidden;">
        <table class="tax-codes-table">
          <thead><tr><th style="width:45%;">BIR Tax Code</th><th>Tax Code in Manager (${taxCodes.length} found)</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div style="margin-top:14px;display:flex;justify-content:flex-end;">
        <button class="btn btn-primary" id="btn-save-taxcodes">💾 Save Mapping</button>
      </div>`;

    // Apply selections (after innerHTML to set selected values)
    out.querySelectorAll('.tc-map-sel').forEach(sel => {
      const catKey = sel.dataset.cat;
      const selectedKey = (overrides[catKey] !== undefined ? overrides[catKey] : auto[catKey]) || '';
      sel.value = selectedKey;
    });

    document.getElementById('btn-save-taxcodes').addEventListener('click', () => {
      const newOverrides = {};
      out.querySelectorAll('.tc-map-sel').forEach(sel => {
        newOverrides[sel.dataset.cat] = sel.value;
      });
      saveMappingOverrides(biz, newOverrides);
      showToast('✅ Tax code mapping saved.', 'success');
    });
  } catch (err) {
    out.innerHTML = `<div class="alert alert-error">❌ ${escHtml(err.message)}</div>`;
  }
}

// ── INIT ─────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', async () => {
  const now  = new Date();
  const curQ = Math.ceil((now.getMonth() + 1) / 3);
  const curY = now.getFullYear();

  const ptypeSel = document.getElementById('f-ptype');
  const qSel = document.getElementById('f-quarter');
  const mSel = document.getElementById('f-month');
  const ySel = document.getElementById('f-year');

  [1,2,3,4].forEach(q => {
    const o = document.createElement('option');
    o.value = q; o.textContent = quarterLabel(q);
    if (q === curQ) o.selected = true;
    qSel.appendChild(o);
  });

  ['January','February','March','April','May','June','July','August','September','October','November','December'].forEach((name, m) => {
    const o = document.createElement('option');
    o.value = m; o.textContent = name;
    if (m === now.getMonth()) o.selected = true;
    mSel.appendChild(o);
  });

  [curY-2, curY-1, curY, curY+1].forEach(y => {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    if (y === curY) o.selected = true;
    ySel.appendChild(o);
  });

  ptypeSel.addEventListener('change', function () {
    const isM = this.value === 'monthly';
    document.getElementById('f-qwrap').style.display = isM ? 'none' : '';
    document.getElementById('f-mwrap').style.display = isM ? '' : 'none';
  });

  // Tab switching — wired up before the Manager connection attempt below so
  // the Tax Codes tab stays usable even if that connection times out.
  document.querySelectorAll('.tab-bar .tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-bar .tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('tab-return').style.display    = tab === 'return'   ? '' : 'none';
      document.getElementById('tab-taxcodes').style.display   = tab === 'taxcodes' ? '' : 'none';
      if (tab === 'taxcodes') loadTaxCodesTab();
    });
  });

  // Detect the active business from Manager
  try {
    App.currentBusiness = await getReportBusiness(document.getElementById('biz-selector-wrap'));
  } catch(e) {
    document.getElementById('output').innerHTML =
      `<div class="alert alert-warn">⚠️ Could not connect to Manager: ${e.message}</div>`;
    return;
  }

  document.getElementById('btn-gen').addEventListener('click', generate);

  // Pre-fill from URL query params (?ptype=&period=&year=) when this page is
  // embedded by a workflow step that already collected the period, and
  // auto-run. The official BIR identification fields (Quarter/Year) always
  // reflect the quarter the chosen period falls in — 2550Q is filed
  // quarterly even when the business's own bookkeeping cadence is monthly —
  // but a monthly period also switches the figures to that single month via
  // the "View" selector, so "monthly view" within the quarter is available.
  const qs = new URLSearchParams(location.search);
  const qPtype = qs.get('ptype');
  const qPeriod = qs.get('period');
  const qYear = qs.get('year');
  if (qPeriod != null) {
    const isMonthly = qPtype === 'monthly';
    const monthIdx = isMonthly ? parseInt(qPeriod, 10) : null;
    qSel.value = isMonthly ? Math.floor(monthIdx / 3) + 1 : qPeriod;
    if (isMonthly) {
      ptypeSel.value = 'monthly';
      mSel.value = monthIdx;
      ptypeSel.dispatchEvent(new Event('change'));
    }
  }
  if (qYear) ySel.value = qYear;
  if (qPeriod || qYear) {
    // Embedded by a wizard step that already collected the period via its
    // own "Choose filing period" step — hide this page's own filter bar so
    // there's only one period picker visible to the user.
    document.getElementById('filter-bar-wrap').style.display = 'none';
    generate();
  }
});

// ── GENERATE ──────────────────────────────────────────────────
async function generate() {
  const biz    = App.currentBusiness || '';
  const output = document.getElementById('output');

  if (!biz) {
    output.innerHTML = `<div class="alert alert-warn">⚠️ No business selected.</div>`;
    return;
  }

  output.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>Loading business setup…</span></div>`;
  const setup = await loadSetup(biz);

  if (!setup || !setup.tin) {
    output.innerHTML = `<div class="alert alert-warn">⚠️ Business info not configured yet. Fill in the <strong>Business</strong> tab in the Tallo CPA extension first.</div>`;
    return;
  }

  const isMonthlyView = document.getElementById('f-ptype').value === 'monthly';
  const quarter = parseInt(document.getElementById('f-quarter').value, 10);
  const year    = parseInt(document.getElementById('f-year').value, 10);
  const month   = isMonthlyView ? parseInt(document.getElementById('f-month').value, 10) : null;
  // Period this generation represents, for the wizard's freeze/variance step
  // (parallels window._v; month is 0-based). The headline figure (window._v)
  // is refreshed by recompute() on manual edits, but the period identity is
  // fixed at generate time, so it's set here.
  window._period = {
    ptype: isMonthlyView ? 'monthly' : 'quarterly',
    year: year,
    period: isMonthlyView ? month : quarter,
    form: '2550Q',
    label: (isMonthlyView ? monthName(month) : 'Q' + quarter) + ' ' + year
  };
  // The official BIR identification fields (Quarter/Year) always reflect the
  // full quarter; "Monthly" only narrows which transactions get totalled
  // into the figures, for businesses that close their books monthly.
  const { start, end } = isMonthlyView ? getPeriodDates('monthly', month, year) : getPeriodDates('quarterly', quarter, year);

  output.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div><span>Fetching transactions from Manager…</span></div>`;

  try {
    const { vm, rateByKey } = await getVatMapping(biz);
    // Fetch invoices + receipts in parallel
    const [salesItems, purchItems, receiptItems, paymentItems] = await Promise.all([
      fetchAllBatch('/api4/sales-invoice-batch',    biz),
      fetchAllBatch('/api4/purchase-invoice-batch', biz),
      fetchAllBatch('/api4/receipt-batch',          biz),
      fetchAllBatch('/api4/payment-batch',          biz),
    ]);

    const sales    = salesItems.filter(({ item }) => inRange(item?.issueDate || item?.Date, start, end));
    const purch    = purchItems.filter(({ item }) => inRange(item?.issueDate || item?.Date, start, end));
    const receipts = receiptItems.filter(({ item }) => inRange(item?.issueDate || item?.Date, start, end));
    const payments = paymentItems.filter(({ item }) => inRange(item?.issueDate || item?.Date, start, end));

    const custMap = await loadPartyBIR(biz, 'customer');

    // ── PART IV: SALES ────────────────────────────────────────
    let vatableSales = 0, zeroRated = 0, exemptSales = 0, outputTax = 0;
    const govtWVRows = [];
    // Include receipts (cash sales) that carry sales tax codes directly on their lines
    for (const { item } of [...sales, ...receipts]) {
      for (const line of (item?.lines || item?.Lines || [])) {
        const tc = line?.taxCode || line?.TaxCode || '';
        if (!tc) continue;
        const { net, tax, gross } = lineAmounts(item, line, rateByKey);
        if (tc === vm.sales_taxable)     { vatableSales += net; outputTax += tax; }
        else if (tc === vm.sales_zero)   { zeroRated    += net; }
        else if (tc === vm.sales_exempt) { exemptSales  += net; }
        else if (tc === vm.govt_wv012 || tc === vm.govt_wv022) {
          const custKey  = item?.customer || item?.Customer || '';
          const cd       = custMap[custKey] || {};
          const custName = cd.companyName || [cd.lastName, cd.firstName].filter(Boolean).join(', ') || custKey;
          const issued   = item?.issueDate || item?.Date;
          const dt       = issued ? new Date(issued) : null;
          govtWVRows.push({
            monthKey: dt ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}` : '',
            period:  dt ? dt.toLocaleDateString('en-PH', { month:'short', year:'numeric' }) : '',
            custKey, name: custName, branch: cd.branchCode || '0001',
            income:  gross / 0.05,
            cwt:     gross,
            type:    tc === vm.govt_wv012 ? 'WV012' : 'WV022',
          });
        }
      }
    }

    // ── PART IV: PURCHASES ────────────────────────────────────
    let capGoods = 0, otherGoods = 0, services = 0, purZero = 0, purExempt = 0;
    let capTax = 0, otherTax = 0, svcTax = 0;
    // Include payments (cash purchases/expenses) that carry purchase tax codes directly on their lines
    for (const { item } of [...purch, ...payments]) {
      for (const line of (item?.lines || item?.Lines || [])) {
        const tc = line?.taxCode || line?.TaxCode || '';
        if (!tc) continue;
        const { net, tax } = lineAmounts(item, line, rateByKey);
        if (tc === vm.purch_capital)      { capGoods   += net; capTax   += tax; }
        else if (tc === vm.purch_other)   { otherGoods += net; otherTax += tax; }
        else if (tc === vm.purch_services){ services   += net; svcTax   += tax; }
        else if (tc === vm.purch_zero)    { purZero    += net; }
        else if (tc === vm.purch_exempt)  { purExempt  += net; }
      }
    }

    // ── SCHEDULE 3: CREDITABLE VAT WITHHELD ───────────────────
    const cwtAccounts  = (setup.vatMapping || {}).cwtAccounts || [];
    const sched3Rows   = [...govtWVRows];

    for (const { item } of receipts) {
      for (const line of (item?.lines || item?.Lines || [])) {
        const acctName = line?.accountName || line?.AccountName || line?.account || line?.Account || '';
        const matched  = cwtAccounts.find(c => c.accountName && acctName.toLowerCase().includes(c.accountName.toLowerCase()));
        if (!matched) continue;
        const amt = Math.abs(Number(line?.amount ?? line?.Amount ?? 0));
        if (amt === 0) continue;
        const custKey  = item?.customer || item?.Customer || '';
        const cd       = custMap[custKey] || {};
        const custName = cd.companyName || [cd.lastName, cd.firstName].filter(Boolean).join(', ') || custKey;
        const issued   = item?.issueDate || item?.Date;
        const dt       = issued ? new Date(issued) : null;
        sched3Rows.push({
          monthKey: dt ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}` : '',
          period:  dt ? dt.toLocaleDateString('en-PH', { month:'short', year:'numeric' }) : '',
          custKey, name: custName, branch: cd.branchCode || '0001',
          income:  Math.abs(Number(item?.amountDue ?? item?.AmountDue ?? item?.total ?? item?.Total ?? 0)),
          cwt:     amt,
          type:    matched.type,
        });
      }
    }

    // Group Schedule 3 detail rows per month per customer per branch (same
    // grouping SAWT uses), summing income payment and CWT amount within
    // each group rather than listing one row per transaction.
    const sched3Grouped = {};
    for (const r of sched3Rows) {
      const k = `${r.monthKey}|${r.custKey}|${r.branch}|${r.type}`;
      if (!sched3Grouped[k]) sched3Grouped[k] = { ...r, income: 0, cwt: 0 };
      sched3Grouped[k].income += r.income;
      sched3Grouped[k].cwt    += r.cwt;
    }
    const sched3RowsGrouped = Object.values(sched3Grouped).sort((a, b) =>
      a.monthKey.localeCompare(b.monthKey) || a.name.localeCompare(b.name) || a.branch.localeCompare(b.branch));

    const totalCWT = sched3Rows.reduce((a, r) => a + r.cwt, 0);

    // ── CARRY-OVER FROM PREV QUARTER ──────────────────────────
    // (carry-over stored in Manager business-details in a future phase)
    const autoCarryOver = 0;

    // ── COMPUTED TOTALS ───────────────────────────────────────
    const totalSales   = vatableSales + zeroRated + exemptSales;
    const totalCurInTax= capTax + otherTax + svcTax;
    const totalCurPurch= capGoods + otherGoods + services + purZero + purExempt;

    // Item 34B
    const i34B = outputTax;
    // Items 35,36 = manual
    // Item 37 = 34B - 35 + 36 (will compute after manual inputs)
    // Item 38 = carry-over (auto or manual)
    // Item 43 = sum of 38-42
    // Item 50 = totalCurInTax
    // Item 51 = 43 + 50
    // Items 52-56 = manual
    // Item 57 = sum of 52-56
    // Item 60 = 51 - 59
    // Item 61 = 37 - 60

    // (VAT result carry-over will be stored in Manager in a future phase)

    renderForm(output, {
      biz, setup, quarter, year, month, isMonthlyView, start, end,
      vatableSales, zeroRated, exemptSales, totalSales, outputTax, i34B,
      capGoods, otherGoods, services, purZero, purExempt,
      capTax, otherTax, svcTax, totalCurInTax, totalCurPurch,
      autoCarryOver, sched3Rows, sched3RowsGrouped, totalCWT,

    document.getElementById('btn-print').style.display = '';

  } catch (err) {

}

// ── RECOMPUTE (triggered by manual input changes) ─────────────
function recompute() {
  const g = id => parseFloat(document.getElementById(id)?.value || document.getElementById(id)?.textContent?.replace(/,/g,'') || 0) || 0;
  const s = id => { const el = document.getElementById(id); if (el) el.textContent = fmt(window._v[id] || 0); };

  const d = window._vatData;
  if (!d) return;

  const i34B = d.i34B;
  const i35  = g('i35'), i36 = g('i36');
  const i37  = i34B - i35 + i36;

  const i38 = g('i38'), i39 = g('i39'), i40 = g('i40'), i41 = g('i41'), i42 = g('i42');
  const i43 = i38 + i39 + i40 + i41 + i42;

  const i51 = i43 + d.totalCurInTax;

  const i52 = g('i52'), i53 = g('i53'), i54 = g('i54'), i55 = g('i55'), i56 = g('i56');
  const i57 = i52 + i53 + i54 + i55 + i56;
  const i58 = g('i58');
  const i59 = i57 + i58;
  const i60 = i51 - i59;
  const i61 = i37 - i60;

  const i16 = d.totalCWT;
  const i17 = g('i17'), i18 = g('i18'), i19 = g('i19');
  const i20 = i16 + i17 + i18 + i19;
  const i21 = i61 - i20;

  const i22 = g('i22'), i23 = g('i23'), i24 = g('i24');
  const i25 = i22 + i23 + i24;
  const i26 = i21 + i25;

  window._v = { i37, i43, i51, i57, i59, i60, i61, i15: i61, i16, i20, i21, i25, i26 };

  const set = (id, val) => { const el = document.getElementById(id); if (!el) return; if (el.tagName === 'INPUT') return; el.textContent = fmt(val); };
  set('i37', i37); set('i43', i43); set('i51', i51);
  set('i57', i57); set('i59', i59); set('i60', i60);
  set('i61', i61); set('i15', i61);
  set('i16', i16); set('i20', i20); set('i21', i21); set('i25', i25); set('i26', i26);

  // Color coding for Item 61
  const el61 = document.getElementById('i61');
  const row61 = document.getElementById('row61');
  if (el61 && row61) {
    el61.className = 'amt ' + (i61 > 0 ? 'payable' : i61 < 0 ? 'refund' : 'computed');
    row61.className = 'bir-row ' + (i61 > 0 ? 'payable' : i61 < 0 ? 'refund' : 'total');
  }

  // Color coding for Item 26
  const el26 = document.getElementById('i26');
  const row26 = document.getElementById('row26');
  if (el26 && row26) {
    el26.className = 'amt ' + (i26 > 0 ? 'payable' : i26 < 0 ? 'refund' : 'computed');
    row26.className = 'bir-row ' + (i26 > 0 ? 'payable' : i26 < 0 ? 'refund' : 'total');
  }

}

    <div class="item-label">${label}</div>
    <div class="item-col"><span class="amt ${clsA}">${fmt(colA)}</span></div>
    <div class="item-col"><span class="amt ${clsB}">${fmt(colB)}</span></div>
  </div>`;
}

function amtRow1A(n, label, val, cls) {
  return `<div class="bir-row">
    <div class="item-no">${n}</div>
    <div class="item-label">${label}</div>
    <div class="item-col"><span class="amt ${cls}">${fmt(val)}</span></div>
    <div class="item-col"></div>
  </div>`;
}
</script>
