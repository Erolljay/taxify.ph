# ============================================================
# Txform.ph — nginx snippet for the entitlement endpoint
#
# Not auto-applied. See the two placement notes below, then
# `nginx -t` and reload.
#
# Every installed extension reads it on report open. As of Phase 1.3 it
# is SESSION-GATED: it requires a valid txfsid session cookie and only
# returns status for a business in the caller's own account (401 if not
# signed in, indistinguishable 404 across accounts) — the old
# enumeration oracle is closed. It still returns only billing status
# (no PII, no books), and the gate it drives is UX-only (real
# enforcement is the provisioner revoking the Manager user, Phase 1.4).
#
# Rate limiting is retained: it blunts brute-forcing of the 401 path and
# general abuse of an endpoint hit on every report open.
# ============================================================

# ── (1) Put this in the http { } context (NOT inside server/location) ──
#   limit_req_zone $binary_remote_addr zone=entitlement:10m rate=5r/s;

# ── (2) Put these inside the extension.txform.ph server { } block ──
    location = /server/entitlement.php {
        limit_req zone=entitlement burst=10 nodelay;

        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_index entitlement.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Never serve the SQLite database (incl. its WAL/SHM/journal sidecars)
    # or the schema over HTTP. Anchored + explicit so a future edit can't
    # silently reopen the sidecars.
    location ~* /server/txform\.db(-wal|-shm|-journal)?$ {
        deny all;
        return 404;
    }
    location = /server/schema.sql {
        deny all;
        return 404;
    }
