# ============================================================
# Txform.ph — nginx snippet for save-tax-rates.php
#
# Not auto-applied. Paste this location block INSIDE the existing
# extension.txform.ph server block (the same one that already serves
# /var/www/taxify), then reload nginx. See DEPLOY-TAX-RATES-SAVE.md for
# the full step-by-step, including creating the password and installing
# php-fpm.
# ============================================================

    location = /save-tax-rates.php {
        auth_basic           "Txform.ph Super Admin";
        auth_basic_user_file /etc/nginx/.htpasswd-taxrates;

        fastcgi_pass unix:/run/php/php8.5-fpm.sock;
        fastcgi_index save-tax-rates.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }
