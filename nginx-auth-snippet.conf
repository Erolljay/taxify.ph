# ============================================================
# Txform.ph — nginx snippet for the Node auth service (Phase 1.3)
#
# The auth/tenancy service runs as a local Node process (see
# server/txform-auth.service) on 127.0.0.1:5100. nginx terminates TLS
# and reverse-proxies the /api/auth and /api/tenancy paths to it, while
# the PHP endpoints (entitlement, save-tax-rates) stay on php-fpm.
#
# Paste inside the txform.ph / books.txform.ph server { } block. The
# rate-limit zone goes in http { } (shared with the entitlement zone or
# its own):
#   limit_req_zone $binary_remote_addr zone=authlink:10m rate=1r/s;
# ============================================================

    # Passwordless sign-in link requests are the abuse-prone endpoint;
    # throttle hard (the service also rate-limits per email in the DB).
    location = /api/auth/request-link {
        limit_req zone=authlink burst=5 nodelay;
        proxy_pass http://127.0.0.1:5100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/auth/ {
        proxy_pass http://127.0.0.1:5100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/tenancy/ {
        proxy_pass http://127.0.0.1:5100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
