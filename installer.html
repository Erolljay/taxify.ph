<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Txform Now! — Admin Installer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>&#127477;&#127469; Txform Now! — Admin Installer</h1>

<div class="business-bar">
  <label>Business
    <select id="business" required></select>
  </label>
</div>

<p class="muted">Install the Txform Now! app for the selected business. It will appear on that business's
<strong>Summary</strong> page.</p>

<div id="install-list"></div>

<script src="shared.js"></script>
<script>
  const TAXIFY_EXT = {
    name: 'Txform Now!',
    url:  'https://erolljay.github.io/taxify.ph/taxify.html',
    placement: 'summary-view',
  };

  let _installed = null;

  async function renderInstallList(b) {
    const container = document.getElementById('install-list');
    if (!container || !b) return;
    container.innerHTML = '<div class="status">Loading...</div>';
    try {
      const res = await apiRequest('GET', '/api4/extension-batch?business=' + encodeURIComponent(b) + '&Skip=0&PageSize=200');
      const items = (res?.items || []).map(it => ({ key: it.key, value: it.item || {} }));
      _installed = items.find(it => (it.value.Endpoint || it.value.endpoint) === TAXIFY_EXT.url) || null;
    } catch (e) {
      _installed = null;
    }
    buildInstallTable(b, container);
  }

  function buildInstallTable(b, container) {
    let badge, action;
    if (_installed) {
      badge = '<span style="font-size:10px;background:#d1fae5;color:#065f46;padding:2px 8px;border-radius:10px;">Installed</span>';
      action = `<button class="secondary" data-action="uninstall" data-key="${escHtml(_installed.key)}" style="font-size:11px;">Uninstall</button>`;
    } else {
      badge = '<span style="font-size:10px;background:#fee2e2;color:#991b1b;padding:2px 8px;border-radius:10px;">Not installed</span>';
      action = `<button class="secondary" data-action="install" style="font-size:11px;">Install</button>`;
    }

    let html = '<table style="width:100%;border-collapse:collapse;margin-bottom:4px;">';
    html += '<thead><tr style="font-size:11px;color:#9ca3af;"><th style="text-align:left;padding:5px 8px;font-weight:500;">App</th><th style="padding:5px 8px;font-weight:500;text-align:center;">Status</th><th style="padding:5px 8px;font-weight:500;text-align:center;">Action</th></tr></thead><tbody>';
    html += `<tr style="border-bottom:.5px solid #f3f4f6;"><td style="padding:7px 8px;font-size:12px;font-weight:500;">${escHtml(TAXIFY_EXT.name)}</td><td style="padding:7px 8px;text-align:center;">${badge}</td><td style="padding:7px 8px;text-align:center;">${action}</td></tr>`;
    html += '</tbody></table>';

    container.innerHTML = html;
    container.querySelectorAll('button[data-action]').forEach(btn => {
      btn.addEventListener('click', () => onInstallAction(btn, b));
    });
  }

  async function onInstallAction(btn, b) {
    const action = btn.dataset.action;
    btn.disabled = true;
    btn.textContent = action === 'install' ? 'Installing...' : 'Uninstalling...';
    try {
      if (action === 'install') {
        await apiRequest('POST', '/api4/extension', {
          business: b,
          value: { Name: TAXIFY_EXT.name, Source: 0, Endpoint: TAXIFY_EXT.url, Placement: TAXIFY_EXT.placement },
        });
      } else {
        await apiRequest('DELETE', '/api4/extension?business=' + encodeURIComponent(b) + '&key=' + encodeURIComponent(btn.dataset.key));
      }
      await renderInstallList(b);
    } catch (err) {
      btn.disabled = false;
      btn.textContent = action === 'install' ? 'Install' : 'Uninstall';
      alert('Failed: ' + err.message);
    }
  }

  loadBusinesses('business', () => renderInstallList(App.currentBusiness));
</script>
</body>
</html>
