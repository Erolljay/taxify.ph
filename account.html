<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Txform · Account</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <style>
    :root {
      --ink:#10253f; --ink2:#44566c; --muted:#75859a; --line:#dde5e1;
      --card:#fff; --page:#f5f8f6; --accent:#0e8f66; --accent-deep:#0a6b4d;
      --accent-wash:#e2f2ea; --navy:#0b2447; --warn-bg:#fffbeb; --warn-fg:#92400e;
      --err-bg:#fef2f2; --err-fg:#991b1b; --radius:10px;
      --shadow:0 1px 3px rgba(16,37,63,.08);
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--page); color:var(--ink);
      font:15px/1.55 system-ui,-apple-system,"Segoe UI",sans-serif; -webkit-font-smoothing:antialiased; }
    a { color:var(--accent-deep); }
    .wrap { max-width:960px; margin:0 auto; padding:0 20px; }

    header.bar { background:var(--navy); color:#fff; padding:14px 0 0; }
    header.bar .top { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; }
    header.bar .brand { font-weight:800; letter-spacing:-.01em; font-size:18px; }
    header.bar .brand .firm { font-weight:500; color:#b9c8dc; margin-left:8px; font-size:14px; }
    header.bar .who { font-size:13px; color:#b9c8dc; display:flex; align-items:center; gap:10px; }
    header.bar .who .signout { font:inherit; font-size:12.5px; font-weight:600; padding:4px 12px;
      background:transparent; color:#b9c8dc; border:1px solid #26456b; border-radius:7px; cursor:pointer; }
    header.bar .who .signout:hover { color:#fff; border-color:#b9c8dc; background:rgba(255,255,255,.06); }

    /* tabs */
    nav.tabs { display:flex; gap:2px; margin-top:14px; overflow-x:auto; }
    nav.tabs button { background:none; border:none; color:#b9c8dc; font:inherit; font-size:14px;
      padding:10px 14px; cursor:pointer; border-bottom:2px solid transparent; white-space:nowrap;
      /* reset the global button pill: a rounded focus ring here escapes the
         navy header and lands on the page below it */
      border-radius:0; outline-offset:-3px; }
    nav.tabs button:hover { color:#fff; }
    nav.tabs button[aria-selected="true"] { color:#fff; font-weight:600; border-bottom-color:var(--accent); }
    nav.tabs[hidden] { display:none; }

    .badge { display:inline-block; font-size:11px; font-weight:700; letter-spacing:.04em; text-transform:uppercase;
      padding:2px 9px; border-radius:99px; }
    .badge.active { background:var(--accent-wash); color:var(--accent-deep); }
    .badge.pending, .badge.grace, .badge.suspended { background:var(--warn-bg); color:var(--warn-fg); }
    .badge.cancelled { background:var(--err-bg); color:var(--err-fg); }
    .badge.role { background:#1c3d63; color:#cfe0f2; }

    main { padding:28px 0 60px; }
    h1 { font-size:22px; letter-spacing:-.02em; margin:0 0 4px; }
    .sub { color:var(--muted); font-size:13.5px; margin:0 0 22px; }

    .card { background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
      box-shadow:var(--shadow); padding:20px 22px; margin-bottom:20px; }
    .card h2 { font-size:16px; margin:0; display:flex; align-items:baseline; justify-content:space-between; gap:10px; }
    .card h2 .use { font-size:12px; font-weight:600; color:var(--muted); font-family:ui-monospace,Menlo,monospace; }
    .card h2 .use.full { color:var(--warn-fg); }

    ul.rows { list-style:none; margin:14px 0 0; padding:0; }
    ul.rows li { display:flex; align-items:center; gap:10px; padding:10px 0; border-top:1px solid var(--line); font-size:14px; }
    ul.rows li:first-child { border-top:none; }
    ul.rows .role { font-size:11px; color:var(--muted); font-family:ui-monospace,Menlo,monospace; }
    ul.rows .spacer { margin-left:auto; }
    .empty { color:var(--muted); font-size:13.5px; padding:12px 0 2px; }
    .note { color:var(--muted); font-size:12.5px; line-height:1.5; margin-top:10px; }

    /* per-tab filter */
    .searchbar { display:flex; align-items:center; gap:10px; margin-top:14px; }
    .searchbar input { flex:1 1 auto; font:inherit; font-size:14px; padding:8px 11px;
      border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); }
    .searchbar .hits { font-size:12px; color:var(--muted); white-space:nowrap; }

    /* "Open" — a link styled as a button, because it navigates */
    a.btn-link { font-size:13px; font-weight:600; padding:5px 13px; border-radius:8px;
      border:1px solid var(--line); color:var(--accent-deep); text-decoration:none; white-space:nowrap; }
    a.btn-link:hover { background:var(--accent-wash); border-color:var(--accent); }

    /* one-time credential handover */
    .handover { width:100%; background:var(--warn-bg); border:1px solid #f2e3b8; border-radius:8px;
      padding:14px 16px; display:flex; flex-direction:column; gap:8px; }
    .handover strong { font-size:13.5px; color:var(--warn-fg); }
    .handover .pw { font-family:ui-monospace,Menlo,monospace; font-size:16px; letter-spacing:.04em;
      background:#fff; border:1px solid #e6d9ad; border-radius:6px; padding:9px 12px;
      user-select:all; word-break:break-all; }
    .handover .note { margin-top:0; color:var(--warn-fg); opacity:.85; }
    .handover-actions { display:flex; gap:8px; }

    /* Authenticator steps, handed over with the password. The numbers must
       actually render — the warning underneath refers to "step 4". */
    details.pairing { margin-top:4px; }
    details.pairing summary { cursor:pointer; font-size:13px; font-weight:600; color:var(--warn-fg); }
    details.pairing ol { margin:10px 0 6px; padding-left:22px; font-size:13.5px; color:var(--ink2); }
    /* `ul.rows li` is a descendant selector, so it also matches these
       nested list items and makes them flex — and a flex item renders no
       list marker. Put them back to list-item or the numbers vanish. */
    details.pairing ol li { display:list-item; list-style:decimal; margin:0 0 6px;
      padding:0 0 0 2px; border:none; gap:0; }
    details.pairing .note { margin-bottom:10px; }
    .handover-actions button { font-size:13px; padding:6px 13px; }

    form.inline { display:flex; gap:8px; margin-top:16px; flex-wrap:wrap; align-items:center; }
    input[type=text], input[type=email], select { flex:1 1 160px; min-width:0; font:inherit; font-size:14px;
      padding:8px 11px; border:1px solid var(--line); border-radius:8px; background:#fff; color:var(--ink); }
    select { flex:0 1 auto; }
    input:focus, select:focus, button:focus-visible { outline:2px solid var(--accent); outline-offset:1px; }
    button { font:inherit; font-size:14px; font-weight:600; padding:8px 16px; border:none; border-radius:8px;
      background:var(--accent); color:#fff; cursor:pointer; }
    button:hover { background:var(--accent-deep); }
    button.ghost { background:transparent; color:var(--accent-deep); border:1px solid var(--line); }
    button.ghost:hover { background:var(--accent-wash); }
    button.danger { background:transparent; color:var(--err-fg); border:1px solid var(--line); font-size:13px; padding:5px 11px; }
    button.danger:hover { background:var(--err-bg); }

    table.matrix { border-collapse:collapse; width:100%; margin-top:14px; font-size:13.5px; }
    table.matrix th, table.matrix td { padding:9px 10px; border-bottom:1px solid var(--line); text-align:center; }
    table.matrix th.rowhead, table.matrix td.rowhead { text-align:left; white-space:nowrap; }
    table.matrix td.rowhead { font-weight:600; }
    table.matrix thead th { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); font-weight:600; }
    table.matrix input[type=checkbox] { width:17px; height:17px; accent-color:var(--accent); cursor:pointer; }
    .scroll { overflow-x:auto; }

    /* provisioner sync state */
    .sync { display:block; font-size:10px; font-family:ui-monospace,Menlo,monospace; margin-top:3px; }
    .sync.pending { color:var(--warn-fg); }
    .sync.failed { color:var(--err-fg); }
    .legend { display:flex; flex-wrap:wrap; gap:14px; font-size:12px; color:var(--muted); margin-top:12px; }

    /* billing */
    .invoice { display:flex; flex-direction:column; gap:0; margin-top:12px; font-size:14px; }
    .invoice div { display:flex; justify-content:space-between; gap:12px; padding:9px 0; border-top:1px solid var(--line); }
    .invoice div:first-child { border-top:none; }
    .invoice .amt { font-family:ui-monospace,Menlo,monospace; font-variant-numeric:tabular-nums; }
    .invoice .total { font-weight:700; border-top:2px solid var(--ink); }
    .voucher { background:var(--accent-wash); color:var(--accent-deep); border-radius:8px;
      padding:10px 13px; font-size:13.5px; margin-top:12px; }

    /* activity */
    ul.log { list-style:none; margin:12px 0 0; padding:0; font-size:13px; }
    ul.log li { display:flex; gap:12px; padding:8px 0; border-top:1px solid var(--line); }
    ul.log li:first-child { border-top:none; }
    ul.log .when { color:var(--muted); font-family:ui-monospace,Menlo,monospace; font-size:11.5px; white-space:nowrap; }
    ul.log .what { font-weight:600; }
    ul.log .target { color:var(--muted); word-break:break-word; }

    .alert { border-radius:8px; padding:10px 13px; font-size:13.5px; margin-top:12px; }
    .alert.ok { background:var(--accent-wash); color:var(--accent-deep); }
    .alert.warn { background:var(--warn-bg); color:var(--warn-fg); }
    .alert.err { background:var(--err-bg); color:var(--err-fg); }

    #signin-view { max-width:420px; margin:8vh auto 0; }
    #signin-view .card { padding:28px 26px; }
    #signin-view h1 { margin-bottom:6px; }
  </style>
</head>
<body>

<header class="bar">
  <div class="wrap">
    <div class="top">
      <div class="brand">Txform<span class="firm" id="firm-name"></span></div>
      <div class="who" id="who" hidden></div>
    </div>
    <nav class="tabs" id="tabs" hidden role="tablist"></nav>
  </div>
</header>

<main class="wrap">

  <!-- ── SIGN IN ─────────────────────────────────────────── -->
  <section id="signin-view" hidden>
    <div class="card">
      <h1>Sign in</h1>
      <p class="sub">Enter your email and we'll send you a one-time sign-in link. No password needed.</p>
      <form class="inline" id="signin-form">
        <input type="email" id="signin-email" placeholder="you@firm.com" required autocomplete="email">
        <button type="submit">Send link</button>
      </form>
      <div id="signin-msg"></div>
    </div>
  </section>

  <!-- ── DASHBOARD ───────────────────────────────────────── -->
  <section id="dashboard-view" hidden>
    <h1 id="panel-title"></h1>
    <p class="sub" id="panel-sub"></p>
    <div id="dash-msg"></div>
    <div id="panel"></div>
  </section>

</main>

<script src="shared/portal-sync.js"></script>
<script src="account.js"></script>
</body>
</html>
