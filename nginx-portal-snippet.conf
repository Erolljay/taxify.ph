# ============================================================
# Txform.ph — nginx snippet for the owner portal (account.html)
#
# Serves the firm-owner portal at  https://txform.ph/account  on the
# SAME origin as the /api/auth + /api/tenancy proxy (nginx-auth-snippet.conf),
# so account.js's cookie'd calls to /api/auth/me and /api/tenancy/* reach
# the Node service. The magic-link verify redirect (see verifyLink in
# server/auth-service.js) lands here on success, and here with ?error=<code>
# on a bad/expired/used link.
#
# Paste inside the SAME txform.ph (apex) 443 server { } block that already
# includes nginx-auth-snippet.conf. account.html / account.js live at the
# repo root, deployed to /var/www/taxify/.
# ============================================================

    # Pretty URL /account → the static portal page. Exact-match so it never
    # shadows the /api/* proxies or other paths.
    location = /account {
        alias /var/www/taxify/account.html;
        default_type text/html;
        add_header Cache-Control "no-cache";   # always serve the freshest deploy
    }

    # The one script account.html loads (relative src="account.js" resolves
    # to /account.js because the page is served at /account).
    location = /account.js {
        alias /var/www/taxify/account.js;
        default_type application/javascript;
    }
