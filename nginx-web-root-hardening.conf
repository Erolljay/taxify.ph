# Deny public access to source, VCS, and ops files that sit in the
# extension.txform.ph web root (/var/www/taxify) but must never be served.
#
# Paste inside the `server { ... }` block for extension.txform.ph in
# /etc/nginx/sites-available/managerserver, then: sudo nginx -t && sudo systemctl reload nginx
#
# Why: the whole git repo is checked out into the web root, so without these
# rules https://extension.txform.ph/.git/config, /server/auth-core.js, and
# /server/schema.sql are all fetchable — that leaks backend logic, the DB
# schema, and enough of .git to reconstruct history.

# Backend source + ops artifacts that only run server-side.
location ~ ^/(server|scripts|docs|\.github)/ {
    deny all;
    return 404;
}

# Version control metadata (classic source-disclosure vector).
location ~ /\.git {
    deny all;
    return 404;
}

# Any other dotfile/dotdir (.env, .claude, .codex, .htpasswd, ...).
location ~ /\.(?!well-known/) {
    deny all;
    return 404;
}
