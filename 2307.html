<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIR Form 2307 – Certificate of Creditable Tax Withheld</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background:#f4f6f9; overflow:auto; height:auto; }
    #app-header { display:none; }
    .report-wrap { max-width:1000px; margin:0 auto; padding:16px; }

    /* ══════════ BIR FORM 2307 — January 2018 (ENCS) — exact replica ══════════
       Pixel-matched to the official form. Kept in this page's own <style>
       so the extension theme (styles.css) never bleeds into the form. */
    .bir-form {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 8pt; color:#000; background:#d7d7d7;
      width: 860px; margin:0 auto 24px; border:2px solid #000;
      box-shadow:0 1px 4px rgba(0,0,0,.2);
      page-break-after: always;
    }
    .bir-form:last-child { page-break-after:auto; }
    .bir-form * { box-sizing:border-box; }

    /* ── Top strip: For BIR Use Only + seal + government header ── */
    .hdr-strip { position:relative; display:flex; align-items:center; justify-content:center; gap:14px; border-bottom:2px solid #000; padding:8px; min-height:82px; background:#fff; }
    .hdr-biruse { position:absolute; left:8px; top:6px; display:flex; gap:6px; font-weight:bold; font-size:8pt; line-height:1.35; }
    .hdr-seal { width:56px; height:auto; }
    .hdr-gov { text-align:center; font-weight:bold; font-size:10pt; line-height:1.4; white-space:nowrap; }

    /* ── Form-name band: 2307 box + title + barcode ── */
    .hdr-band { display:flex; align-items:stretch; border-bottom:2px solid #000; background:#fff; }
    .formno-box { width:250px; border-right:2px solid #000; text-align:center; padding:2px 8px 4px; display:flex; flex-direction:column; justify-content:center; }
    .formno-box .lbl { font-size:8pt; }
    .formno-box .big { font-size:32pt; font-weight:bold; line-height:1; }
    .formno-box .small { font-size:8.5pt; }
    .formname-box { flex:1; display:flex; align-items:center; justify-content:center; text-align:center; padding:4px; }
    .formname-box .t { font-size:15pt; font-weight:bold; line-height:1.2; white-space:nowrap; }
    .barcode-box { width:252px; border-left:2px solid #000; padding:8px 10px 4px; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .barcode-box img { width:230px; height:auto; }
    .barcode-box .code { align-self:flex-end; font-size:8.5pt; margin-top:4px; }

    .bir-note { font-size:8pt; border-bottom:2px solid #000; padding:2px 8px; background:#d7d7d7; }

    /* ── Rows / cells ── */
    .row { display:flex; border-bottom:1px solid #000; }
    .row:last-child { border-bottom:none; }
    .cell { border-right:1px solid #000; padding:3px 8px; flex:1; line-height:1.3; position:relative; }
    .cell:last-child { border-right:none; }
    .num { font-weight:bold; }
    .lbl-i { font-style:italic; }

    .section-title { text-align:center; font-weight:bold; font-size:9pt; padding:2px; border-bottom:2px solid #000; border-top:2px solid #000; }

    /* white fill-in field */
    .field { background:#fff; border:1px solid #000; min-height:20px; margin-top:3px; padding:2px 5px; font-weight:bold; font-size:9pt; }

    .period-row { display:flex; align-items:center; gap:8px; padding:5px 8px; border-bottom:2px solid #000; font-size:8.5pt; flex-wrap:wrap; }
    .period-row .num { margin-right:4px; }
    .tiny { font-size:7pt; font-style:italic; }

    /* segmented boxes */
    .seg { display:inline-flex; border:1px solid #000; background:#fff; vertical-align:middle; }
    .seg i { width:16px; text-align:center; border-right:1px solid #b9b9b9; font-style:normal; font-family:'Courier New',monospace; font-size:9pt; padding:2px 0; font-weight:bold; }
    .seg i:last-child { border-right:none; }
    .tin { display:inline-flex; align-items:center; margin-top:3px; }
    .tin .seg { margin:0; }
    .tin .dash { width:16px; height:22px; background:#9c9c9c; border:1px solid #000; margin:0 4px; display:inline-block; }

    .cell.w60 { flex:0 0 60%; }
    .cell.zip { flex:0 0 40%; }
    .cell.zip .seg { margin-top:3px; }

    /* Part III table */
    .det { width:100%; border-collapse:collapse; }
    .det th { border:1px solid #000; padding:4px 3px; text-align:center; background:#d7d7d7; font-weight:bold; font-size:8pt; line-height:1.2; }
    .det td { border:1px solid #000; padding:3px 5px; height:20px; background:#fff; font-size:8pt; text-align:right; }
    .det td.left { text-align:left; }
    .det td.center { text-align:center; }
    .det td.gray, .det .section-row td, .det .total-row td.lbl { background:#d7d7d7; }
    .det .total-row td { font-weight:bold; }
    .det .section-row td { font-weight:bold; text-align:left; background:#d7d7d7; }

    .cert-box { padding:6px 10px; font-size:8pt; line-height:1.5; text-align:justify; border-bottom:2px solid #000; border-top:2px solid #000; }

    .sig-box { background:#fff; min-height:52px; border-bottom:1px solid #000; display:flex; flex-direction:column; align-items:center; justify-content:flex-end; padding:8px 8px 4px; }
    .sig-box img { max-height:30px; max-width:220px; margin-bottom:2px; }
    .sig-box .sig-name { font-weight:bold; font-size:9pt; text-transform:uppercase; }
    .sig-box .sig-pos { font-size:8pt; }
    .sig-cap { background:#d7d7d7; text-align:center; font-size:8pt; padding:3px 8px; border-bottom:1px solid #000; }
    .sig-cap .cap { font-weight:normal; }
    .sig-cap .cap strong { font-weight:bold; }
    .sig-cap .sub { font-style:italic; font-size:7.5pt; }
    .conforme { text-align:center; font-weight:bold; font-size:9pt; padding:3px; border-bottom:1px solid #000; }
    .acc-row { display:flex; border-bottom:2px solid #000; }
    .acc-row .cell { font-size:7.5pt; min-height:34px; display:flex; flex-direction:row; align-items:center; gap:8px; }
    .acc-row .cell .acc-lbl { white-space:nowrap; }
    .acc-row .cell .wbox { flex:1; align-self:stretch; background:#fff; border:1px solid #000; margin:3px 0; }
    .acc-row .cell .seg { margin:0; }
    .acc-row .cell.w40 { flex:0 0 40%; }
    .footer-note { font-size:7.5pt; padding:3px 8px; }

    @media print {
      body { background:#fff; }
      .filter-bar, .btn, .no-print, .page-header { display:none !important; }
      .report-wrap { padding:0; max-width:100%; }
      .bir-form { width:100%; box-shadow:none; }
      @page { margin:8mm; size:A4; }
    }
  </style>
</head>
<body>
<div class="report-wrap">
  <div class="page-header no-print">
    <div>
      <div class="page-title">BIR Form 2307 — Certificate of Creditable Tax Withheld at Source</div>
      <div class="page-subtitle">Generated per supplier from purchase invoices / payments with EWT</div>
    </div>
  </div>
  <div id="biz-selector-wrap" class="no-print"></div>
  <div id="filter-area" class="no-print"></div>
  <div id="report-output"></div>
</div>

<script src="shared/entitlement-core.js"></script>
<script src="shared/entitlement.js"></script>
<script src="shared/tax-rates.js"></script>
<script src="helpers/ewt-helpers.js"></script>
<script src="shared/tax-codes.js"></script>
<script src="reports/2307-report.js"></script>
<script>

</script>
</body>
</html>
