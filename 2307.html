<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIR Form 2307 – Certificate of Creditable Tax Withheld</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: white; overflow: auto; height: auto; }
    #app-header { display: none; }
    .report-wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }

    /* ══════════ BIR FORM 2307 PRINT LAYOUT ══════════ */
    .bir-form {
      font-family: Arial, sans-serif;
      font-size: 8pt;
      color: #000;
      max-width: 880px;
      margin: 0 auto 24px;
      border: 1.5px solid #000;
      padding: 8px 10px;
      page-break-after: always;
    }
    .bir-form:last-child { page-break-after: auto; }

    .bir-top { display: flex; align-items: flex-start; gap: 8px; border-bottom: 1px solid #000; padding-bottom: 4px; margin-bottom: 4px; }
    .bir-top .formno-box { border: 1px solid #000; padding: 4px 8px; text-align: center; min-width: 90px; }
    .bir-top .formno-box .big { font-size: 18pt; font-weight: bold; line-height: 1; }
    .bir-top .formno-box .small { font-size: 6pt; }
    .bir-top .title-box { flex: 1; text-align: center; }
    .bir-top .title-box .republic { font-size: 7.5pt; }
    .bir-top .title-box .formname { font-size: 14pt; font-weight: bold; text-transform: uppercase; margin-top: 2px; }
    .bir-top .barcode-box { border: 1px solid #000; min-width: 110px; text-align: center; font-size: 6pt; padding: 4px; }

    .bir-note { font-size: 7pt; border-bottom: 1px solid #000; padding: 2px 0; margin-bottom: 2px; }

    .period-row { display: flex; align-items: center; gap: 6px; font-size: 8pt; padding: 3px 0; border-bottom: 1px solid #000; margin-bottom: 2px; }
    .period-row .num { font-weight: bold; margin-right: 4px; }
    .period-box { border: 1px solid #000; padding: 2px 8px; min-width: 90px; text-align: center; font-weight: bold; }

    .bir-section-title {
      background: #d9d9d9; font-weight: bold; font-size: 8pt;
      padding: 2px 6px; text-align: center; border: 1px solid #000;
      border-top: none; margin-top: -1px;
    }

    .bir-row { display: flex; border: 1px solid #000; border-top: none; }
    .bir-row.first { border-top: 1px solid #000; }
    .bir-cell { border-right: 1px solid #000; padding: 2px 6px; font-size: 8pt; line-height: 1.3; flex: 1; min-height: 16px; }
    .bir-cell:last-child { border-right: none; }
    .bir-cell .num { font-weight: bold; }
    .bir-cell .lbl { font-style: italic; }
    .bir-cell .val { font-weight: bold; display: block; margin-top: 1px; }
    .bir-cell.w50 { flex: 0 0 50%; }
    .bir-cell.w25 { flex: 0 0 25%; }
    .bir-cell.w15 { flex: 0 0 15%; }
    .tin-boxes { display: inline-flex; gap: 2px; align-items: center; font-weight: bold; font-family: monospace; }
    .tin-boxes span { border: 1px solid #000; padding: 1px 4px; min-width: 14px; display: inline-block; text-align: center; }
    .tin-boxes .dash { border: none; }

    .bir-detail-table { width: 100%; border-collapse: collapse; font-size: 7.5pt; border: 1px solid #000; border-top: none; }
    .bir-detail-table th { border: 1px solid #000; padding: 2px 3px; text-align: center; background: #e8e8e8; font-weight: bold; font-size: 7pt; line-height: 1.2; }
    .bir-detail-table td { border: 1px solid #000; padding: 2px 4px; text-align: right; font-size: 7.5pt; height: 14px; }
    .bir-detail-table td.left { text-align: left; }
    .bir-detail-table td.center { text-align: center; }
    .bir-detail-table .total-row td { font-weight: bold; background: #f0f0f0; }
    .bir-detail-table .section-row td { font-weight: bold; text-align: left; background: #f0f0f0; }

    .cert-box {
      border: 1px solid #000; border-top: none; padding: 6px 8px;
      font-size: 7.5pt; line-height: 1.4; text-align: justify;
    }
    .conforme-title { background: #d9d9d9; font-weight: bold; text-align: center; font-size: 8pt; border: 1px solid #000; border-top: none; padding: 2px; }

    .sig-area { border: 1px solid #000; border-top: none; padding: 14px 8px 4px; font-size: 7.5pt; text-align: center; }
    .sig-area .sig-line { border-bottom: 1px solid #000; width: 70%; margin: 0 auto 2px; height: 34px; display: flex; align-items: flex-end; justify-content: center; }
    .sig-sub { font-size: 6.5pt; }

    .sig-meta-row { display: flex; border: 1px solid #000; border-top: none; }
    .sig-meta-row .bir-cell { font-size: 6.5pt; }

    .footer-note { font-size: 6.5pt; padding: 2px 0; }

    @media print {
      .filter-bar, .btn, .no-print { display: none !important; }
      .bir-form { border: 1px solid #000; max-width: 100%; }
      @page { margin: 8mm; size: A4; }
    }
  </style>
</head>
<body>
<div class="report-wrap">
  <div class="page-header no-print">
    <div>
      <div class="page-title">📜 BIR Form 2307 — Certificate of Creditable Tax Withheld at Source</div>
      <div class="page-subtitle">Generated per supplier from purchase invoices / payments with EWT</div>
    </div>
  </div>
  <div id="biz-selector-wrap" class="no-print"></div>
  <div id="filter-area" class="no-print"></div>
  <div id="report-output"></div>
</div>
<script>const REPORT_ID = "a7b8c9d0-e1f2-4345-a678-b9c0d1e2f3a4";</script>
<script src="shared.js"></script>
<script src="ewt-helpers.js"></script>
<script src="tax-codes.js"></script>
<script src="2307-report.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => init2307Report());
</script>
</body>
</html>
