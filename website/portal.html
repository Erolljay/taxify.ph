<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Txform.ph</title>
  <meta name="description" content="Sign in to Txform.ph with a secure, passwordless magic link sent to your email.">
  <meta name="robots" content="noindex">
  <link rel="canonical" href="https://www.txform.ph/portal.html">
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/site.css">
</head>
<body>
  <header class="site-header">
    <div class="wrap nav">
      <a class="brand" href="/" aria-label="Txform.ph home"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 100 100"><path d="M34 50h30" stroke="#fff" stroke-width="8" stroke-linecap="round"/><path d="M52 38l14 12-14 12" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Txform<span style="color:var(--green)">.ph</span></a>
      <div class="nav-cta" style="margin-left:auto"><a class="btn btn-ghost" href="/">← Back to site</a></div>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="auth-card" data-auth-panel>
      <a class="brand" href="/" aria-label="Txform.ph"><span class="brand-mark" aria-hidden="true"><svg viewBox="0 0 100 100"><path d="M34 50h30" stroke="#fff" stroke-width="8" stroke-linecap="round"/><path d="M52 38l14 12-14 12" fill="none" stroke="#fff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/></svg></span>Txform<span style="color:var(--green)">.ph</span></a>
      <h1>Sign in</h1>
      <p>Enter your email and we'll send you a secure sign-in link — no password needed.</p>
      <form class="auth-form" data-magiclink novalidate>
        <label for="email">Email address</label>
        <input id="email" type="email" name="email" placeholder="you@yourfirm.ph" required autocomplete="email" autofocus>
        <p class="auth-error" role="alert" hidden></p>
        <button class="btn btn-primary" type="submit">Send me a sign-in link</button>
      </form>
      <p class="auth-fineprint">The link expires shortly and can be used once. By signing in you agree to our <a href="/terms.html" style="color:var(--green-600)">Terms</a> and <a href="/privacy.html" style="color:var(--green-600)">Privacy Policy</a>.</p>
    </div>
  </main>

  <p class="auth-alt" style="padding-bottom:2rem">New to Txform? <a href="/#early-access">Get early access →</a></p>

  <script src="/assets/js/site.js" defer></script>
</body>
</html>
