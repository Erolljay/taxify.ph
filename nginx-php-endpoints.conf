# Route the session-authenticated PHP endpoints to php-fpm on the
# extension.txform.ph server block. Without this they fall through to
# `location /` and get served as RAW STATIC FILES (GET → 200 with the PHP
# source, POST → 405) instead of executing — which breaks save/freeze and
# leaks endpoint source.
#
# These sit at the web root (not server/) because the web-root hardening
# 404s the whole /server/ path. `location =` (exact match) is highest
# priority, so placement within the server block doesn't matter and there's
# no ordering interaction with the hardening regex.
#
# Paste ONE line into the extension.txform.ph server block in
# /etc/nginx/sites-available/managerserver (right below the existing
# `location = /save-tax-rates.php { ... }` block):
#
#     include /var/www/taxify/nginx-php-endpoints.conf;
#
# then: sudo nginx -t && sudo systemctl reload nginx
#
# Socket must match the installed PHP (see the save-tax-rates.php block —
# currently php8.5-fpm). Bump here if PHP is upgraded.

location = /entitlement.php {
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

location = /save-report.php {
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}

location = /report-snapshots.php {
    fastcgi_pass unix:/run/php/php8.5-fpm.sock;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
}
